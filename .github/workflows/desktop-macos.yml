name: Desktop macOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/desktop-macos.yml
      - apps/desktop/**
      - apps/bridge/**
      - apps/web/**
      - packages/shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/desktop-macos.yml
      - apps/desktop/**
      - apps/bridge/**
      - apps/web/**
      - packages/shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json

concurrency:
  group: desktop-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-packaged-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Packaged Desktop
        run: corepack pnpm build:desktop

      - name: Validate Packaged Desktop
        run: corepack pnpm validate:desktop:packaged

      - name: Upload Joudo.app
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Joudo.app-macos
          path: apps/desktop/src-tauri/target/release/bundle/macos/Joudo.app
          if-no-files-found: error