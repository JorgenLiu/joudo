name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      build_dmg:
        description: Build a DMG artifact after the app build
        required: true
        default: true
        type: boolean
      prepare_signing:
        description: Run the signing readiness placeholder stage
        required: true
        default: false
        type: boolean

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-app:
    name: Build unsigned app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Packaged Desktop
        run: corepack pnpm build:desktop

      - name: Validate Packaged Desktop
        run: corepack pnpm validate:desktop:packaged

      - name: Archive Joudo.app
        run: |
          mkdir -p apps/desktop/src-tauri/target/release/bundle/artifacts
          ditto -c -k --keepParent \
            apps/desktop/src-tauri/target/release/bundle/macos/Joudo.app \
            apps/desktop/src-tauri/target/release/bundle/artifacts/Joudo-${{ matrix.arch }}.app.zip

      - name: Upload archived Joudo.app
        uses: actions/upload-artifact@v4
        with:
          name: Joudo.app-macos-${{ matrix.arch }}-release
          path: apps/desktop/src-tauri/target/release/bundle/artifacts/Joudo-${{ matrix.arch }}.app.zip
          if-no-files-found: error

  build-dmg:
    name: Build dmg artifact (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-app
    if: ${{ inputs.build_dmg }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download Joudo.app
        uses: actions/download-artifact@v4
        with:
          name: Joudo.app-macos-${{ matrix.arch }}-release
          path: apps/desktop/src-tauri/target/release/bundle/artifacts

      - name: Restore Joudo.app bundle
        run: |
          mkdir -p apps/desktop/src-tauri/target/release/bundle/macos
          ditto -x -k \
            apps/desktop/src-tauri/target/release/bundle/artifacts/Joudo-${{ matrix.arch }}.app.zip \
            apps/desktop/src-tauri/target/release/bundle/macos

      - name: Build DMG
        env:
          JOUDO_DMG_ARCH: ${{ matrix.arch }}
        run: node apps/desktop/scripts/build-dmg.mjs

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Joudo.dmg-macos-${{ matrix.arch }}-release
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*_${{ matrix.arch }}.dmg
          if-no-files-found: error

  signing-readiness:
    name: Signing and notarization readiness
    runs-on: macos-15-intel
    needs:
      - build-app
    if: ${{ inputs.prepare_signing }}
    timeout-minutes: 10

    steps:
      - name: Explain current signing status
        run: |
          echo "Signing/notarization is intentionally not wired yet."
          echo "Next stage should add certificate import, codesign, notarytool submission, and stapling once secrets are available."
